<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Prediction</title>
</head>
<body>
    <h1>Car Price Prediction</h1>
    
    <form action="/predict" method="POST">
        <label for="name">Car Model:</label>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="year">Year:</label>
        <input type="text" id="year" name="year" required><br><br>
        
        <label for="km_driven">Kilometers Driven:</label>
        <input type="text" id="km_driven" name="km_driven" required><br><br>
        
        <label for="fuel">Fuel Type:</label>
        <select id="fuel" name="fuel" required>
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="CNG">CNG</option>
            <option value="Electric">Electric</option>
        </select><br><br>
        
        <label for="seller_type">Seller Type:</label>
        <select id="seller_type" name="seller_type" required>
            <option value="Dealer">Dealer</option>
            <option value="Individual">Individual</option>
        </select><br><br>
        
        <label for="transmission">Transmission:</label>
        <select id="transmission" name="transmission" required>
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
        </select><br><br>
        
        <label for="owner">Owner Type:</label>
        <select id="owner" name="owner" required>
            <option value="First Owner">First Owner</option>
            <option value="Second Owner">Second Owner</option>
            <option value="Third Owner">Third Owner</option>
        </select><br><br>
        
        <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
        <h2>{{ prediction_text }}</h2>
    {% endif %}
</body>
</html>
